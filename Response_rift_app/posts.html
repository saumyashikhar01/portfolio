<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts — ResponseRift</title>

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

   <link rel="stylesheet" href="assets/css/posts.css">
   
</head>

<!--
  data-endpoint tells script.js which resource to fetch.
  data-perpage  controls how many cards per page.
-->
<body data-endpoint="posts" data-perpage="9">

  
<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-brand">Response<span>rift</span></div>
  <ul class="navbar-links">
    <li><a href="index.html"    class="active">Users</a></li>
    <li><a href="posts.html"             >Posts</a></li>
    <li><a href="photos.html"            >Photos</a></li>
    <li><a href="reviews.html"           >Reviews</a></li>
    <li><a href="products.html"          >Products</a></li>
  </ul>
</nav>

<!-- ══════════════════════════════════════════
     PAGE HEADER
══════════════════════════════════════════ -->
<header class="page-header">
  <div class="page-logo">
    <i class="fas fa-satellite-dish"></i>
    ResponseRift
  </div>
  <div class="header-right">
    <span class="endpoint-badge" id="endpointTag">posts</span>
  </div>
</header>


<!-- ══════════════════════════════════════════
     HERO
══════════════════════════════════════════ -->
<div class="hero">
  <div class="hero-eyebrow">
    <i class="fas fa-rss"></i>&nbsp; Live API data
  </div>
  <h1>Posts Explorer</h1>
  <p>
    Browse all posts fetched from the API. Click the
    <span style="color:#10b981;font-weight:600;">user&nbsp;chip</span>
    on any card to instantly fetch and preview that user's full profile.
  </p>
</div>


<!-- ══════════════════════════════════════════
     TOOLBAR
══════════════════════════════════════════ -->
<div class="toolbar">
  <div class="search-wrap">
    <i class="fas fa-search"></i>
    <input
      id="searchInput"
      type="search"
      placeholder="Filter posts by title, body or tag…"
      autocomplete="off"
    />
  </div>
  <div class="stat-chip">
    <strong id="totalCount">—</strong> posts total
  </div>
  <div class="stat-chip" id="pageIndicator">— / —</div>
</div>


<!-- ══════════════════════════════════════════
     CARDS GRID
══════════════════════════════════════════ -->
<section id="main-section">
  <div id="cardsGrid">
    <!-- populated by script.js → renderPosts() -->
  </div>
</section>


<!-- ══════════════════════════════════════════
     PAGINATION
══════════════════════════════════════════ -->
<nav class="pagination" aria-label="Page navigation">
  <span id="pageInfo" aria-live="polite"></span>

  <div class="pag-controls">
    <button class="pag-btn" id="prevBtn" aria-label="Previous page">
      <i class="fas fa-chevron-left"></i> Prev
    </button>

    <div id="pagPages" role="list" aria-label="Page numbers"></div>

    <button class="pag-btn" id="nextBtn" aria-label="Next page">
      Next <i class="fas fa-chevron-right"></i>
    </button>
  </div>
</nav>

<!--
  #detailModal is injected dynamically by script.js
  when the first .click-user chip is clicked.
  It is removed from the DOM when closed.
-->

<script src="assets/script/script.js"></script>
<script src="assets/script/posts.js"></script>
</body>
</html>
